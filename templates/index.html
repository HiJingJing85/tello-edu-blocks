<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tello EDU 블록코딩</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- ===== 헤더 ===== -->
  <header class="header">
    <div class="header-left">
      <div class="title">Tello EDU 블록코딩</div>
    </div>

    <!-- 연결 상태 + 안내 메시지 -->
    <div class="connection-status">
      <div id="statusDot" class="status-dot"></div>
      <div class="status-info">
        <span id="statusText" class="status-text">연결 안 됨</span>
        <span id="statusGuide" class="status-guide">Tello WiFi에 연결 후 연결 버튼을 눌러주세요</span>
      </div>
    </div>

    <!-- 연결 버튼 -->
    <div class="header-buttons">
      <button id="btnConnect" class="btn btn-connect">📡 연결</button>
      <button id="btnDisconnect" class="btn btn-disconnect" disabled>🔌 해제</button>
    </div>

  </header>

  <!-- ===== 메인 콘텐츠 ===== -->
  <div class="main-container">

    <!-- 왼쪽: 블록 에디터 -->
    <div class="editor-panel">
      <!-- 탭 바 -->
      <div class="tab-bar">
        <div id="tabBlocks" class="tab active">블록</div>
        <div id="tabCode" class="tab">명령어 보기</div>
      </div>

      <!-- Blockly 워크스페이스 -->
      <div id="blocklyDiv"></div>

      <!-- 코드 미리보기 -->
      <div id="codePanel">
        <pre id="codePreview">// 블록을 추가하면 명령어가 여기에 표시됩니다.</pre>
      </div>
    </div>

    <!-- 오른쪽: 사이드바 -->
    <div class="sidebar">

      <!-- 실행 컨트롤 -->
      <div class="control-panel">
        <button id="btnRun" class="btn btn-run">▶ 실행</button>
        <button id="btnEmergency" class="btn btn-emergency">🚨 긴급정지</button>
      </div>

      <!-- 드론 상태 -->
      <div class="status-panel">
        <h3>드론 상태</h3>
        <div class="status-grid">
          <div class="status-item">
            <div class="status-label">배터리</div>
            <div id="battery" class="status-value">-</div>
          </div>
          <div class="status-item">
            <div class="status-label">높이</div>
            <div id="height" class="status-value">-</div>
          </div>
          <div class="status-item">
            <div class="status-label">온도</div>
            <div id="temperature" class="status-value">-</div>
          </div>
          <div class="status-item">
            <div class="status-label">비행시간</div>
            <div id="flightTime" class="status-value">-</div>
          </div>
        </div>
      </div>

      <!-- 파일 관리 -->
      <div class="file-buttons">
        <button id="btnSave" class="btn btn-secondary">💾 저장</button>
        <button id="btnLoad" class="btn btn-secondary">📂 불러오기</button>
        <button id="btnClear" class="btn btn-secondary">🗑️ 초기화</button>
      </div>

      <!-- 실행 로그 -->
      <div class="log-panel">
        <h3>실행 로그</h3>
        <div id="logArea"></div>
      </div>

      <!-- 제작자 -->
      <div class="sidebar-author">Made by 박수형</div>

    </div>
  </div>

  <!-- ===== Blockly 라이브러리 (로컬 번들) ===== -->
  <script src="/static/lib/blockly_compressed.js"></script>
  <script src="/static/lib/blocks_compressed.js"></script>
  <script src="/static/lib/javascript_compressed.js"></script>
  <script src="/static/lib/ko.js"></script>

  <!-- Tello 커스텀 블록 및 앱 로직 -->
  <script src="/static/js/blocks.js"></script>
  <script src="/static/js/generators.js"></script>
  <script src="/static/js/app.js"></script>

</body>
</html>
